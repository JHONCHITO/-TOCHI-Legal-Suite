services:
  app:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    restart: unless-stopped
