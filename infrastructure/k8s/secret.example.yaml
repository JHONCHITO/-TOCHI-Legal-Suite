apiVersion: v1
kind: Secret
metadata:
  name: tochi-legal-suite-secrets
  namespace: tochi-legal-suite
type: Opaque
stringData:
  MONGODB_URI: "mongodb+srv://user:password@cluster.example.mongodb.net/tochi"
  NEXTAUTH_URL: "https://tochi.example.com"
  NEXTAUTH_SECRET: "replace-with-a-long-random-secret"
  OPENAI_API_KEY: "replace-with-openai-key"
